<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Weather Dashboard</title>

  <!-- PWA: installable as an iOS home-screen app -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0f0c29" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Weather" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <button class="menu-btn" id="menuBtn" aria-label="Open favorites menu">☰</button>

  <div class="fav-backdrop hidden" id="favBackdrop"></div>

  <aside class="fav-panel" id="favPanel" aria-label="Favorite cities">
    <div class="fav-panel-header">
      <h2 class="fav-panel-title">Favorites</h2>
      <button class="fav-close-btn" id="favCloseBtn" aria-label="Close favorites menu">×</button>
    </div>
    <div class="fav-list" id="favList"></div>
  </aside>

  <div class="app-wrapper">

    <header class="site-header">
      <h1 class="site-title">⛅ Weather Dashboard</h1>
      <form class="search-form" id="searchForm">
        <div class="search-field">
          <input
            type="text"
            id="cityInput"
            class="search-input"
            placeholder="Enter city name…"
            autocomplete="off"
            spellcheck="false"
            role="combobox"
            aria-expanded="false"
            aria-autocomplete="list"
            aria-controls="suggestions"
          />
          <ul class="suggestions hidden" id="suggestions" role="listbox" aria-label="City suggestions"></ul>
        </div>
        <button type="submit" class="search-btn" id="searchBtn">Search</button>
      </form>
      <p class="error-message hidden" id="errorMsg" role="alert"></p>
    </header>

    <div class="loader hidden" id="loader" aria-live="polite">
      <div class="spinner"></div>
      <p class="loader-text">Fetching weather…</p>
    </div>

    <section class="current-weather hidden" id="currentWeather">
      <button class="fav-toggle" id="favToggle" aria-label="Toggle favorite"></button>
      <div class="current-location" id="cityName"></div>
      <div class="current-icon" id="weatherIcon"></div>
      <div class="current-temp" id="temperature"></div>
      <div class="current-condition" id="condition"></div>
      <div class="weather-meta">
        <span class="meta-item" id="windSpeed"></span>
        <span class="meta-divider"></span>
        <span class="meta-item" id="humidity"></span>
        <span class="meta-divider"></span>
        <span class="meta-item" id="currentPrecip"></span>
      </div>
    </section>

    <section class="forecast hidden" id="forecast">
      <h2 class="forecast-heading">7-Day Forecast</h2>
      <div class="forecast-cards" id="forecastCards"></div>
    </section>

  </div>

  <noscript>
    <p class="noscript-msg">JavaScript is required to use this weather dashboard.</p>
  </noscript>

  <script defer src="app.js"></script>

  <!-- Register the service worker for offline launch (relative URL keeps scope under the sub-path) -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {
          /* registration failed (e.g. insecure context) — app still works online */
        });
      });
    }
  </script>
</body>
</html>
